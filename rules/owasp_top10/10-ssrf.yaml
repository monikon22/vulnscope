---
id: OWASP_A10_SSRF_001
title: SSRF Error Indicator
description: Detects SSRF-like server-side fetch errors after safe URL probes.
category: ssrf
severity: high
confidence_base: 65
cwe: CWE-918
payloads:
  - "https://example.invalid/"
  - "http://127.0.0.1/"
match:
  type: regex
  values:
    - "(connection refused|could not resolve host|ECONNREFUSED|No route to host|failed to open stream|getaddrinfo|cURL error|curl_exec)"
recommendation: Validate and restrict URLs that the application can request; implement allow-listing and metadata protection.
references:
  - https://owasp.org/www-project-top-ten/
safe: true
enabled: true
